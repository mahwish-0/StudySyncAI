<!DOCTYPE html>
<html>
<head>
<title>Verify OTP | StudySync AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif}
body{
min-height:100vh;display:flex;align-items:center;justify-content:center;
background:linear-gradient(135deg,#0f172a,#312e81);
color:white;padding:20px;
}
.card{
width:100%;max-width:430px;
background:rgba(255,255,255,.09);
border:1px solid rgba(255,255,255,.18);
backdrop-filter:blur(22px);
border-radius:28px;
padding:38px;
box-shadow:0 30px 80px rgba(0,0,0,.45);
}
.logo{font-size:26px;font-weight:900;margin-bottom:25px;color:#c4b5fd}
h1{font-size:34px;margin-bottom:10px}
p{color:#ddd6fe;line-height:1.6;margin-bottom:25px}
input{
width:100%;padding:15px;border-radius:15px;border:1px solid rgba(255,255,255,.2);
background:rgba(255,255,255,.1);color:white;font-size:18px;text-align:center;letter-spacing:5px;outline:none;margin-bottom:15px;
}
button{
width:100%;padding:15px;border:0;border-radius:15px;
background:linear-gradient(135deg,#8b5cf6,#6366f1);
color:white;font-weight:900;font-size:16px;cursor:pointer;
}
</style>
</head>
<body>
<div class="card">
<div class="logo">⚡ StudySync AI</div>
<h1>Verify OTP</h1>
<p>Enter the OTP sent to your phone number.</p>

<form method="POST">
{% csrf_token %}
<input type="text" name="otp" placeholder="••••••" required>
<button type="submit">Verify & Continue</button>
</form>
</div>
</body>
</html>
